include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - build/**
    - .dart_tool/**
    - macos/Flutter/ephemeral/**
    - macos/Pods/**
    - macos/Runner.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/**
    - macos/Runner.xcworkspace/xcshareddata/swiftpm/**
  errors:
    unused_import: ignore
    unused_element: ignore
    duplicate_import: ignore
    unused_field: ignore
    dead_null_aware_expression: ignore
    unnecessary_brace_in_string_interps: ignore
    await_only_futures: ignore
    use_build_context_synchronously: ignore
    deprecated_member_use: ignore
    unnecessary_import: ignore
    no_leading_underscores_for_local_identifiers: ignore

linter:
  rules:
    prefer_const_constructors: false
    avoid_print: false
