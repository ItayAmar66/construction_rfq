name: construction_rfq
description: MVP marketplace for construction supply quote requests (RFQ).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  firebase_storage: ^12.4.10
  cloud_firestore: ^5.6.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  http: ^1.2.2
  googleapis_auth: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
